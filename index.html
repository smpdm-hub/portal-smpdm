    async function fetchLinks() {
      if (GAS_URL.includes("ISI_DENGAN")) return;
      try {
        const res = await fetch(`${GAS_URL}?action=getLinks`);
        const data = await res.json();
        if (data.status === 'success') {
          appLinks = data.links || [];
          if (currentUser) {
             renderAdminLinks();
          } else {
             renderPublicLinks();
          }
        }
      } catch (e) {
        console.error("Gagal menarik data");
      }
    }

      if (currentUser) {

                <h1 class="font-bold">Panel Admin Web</h1>
              </div>
              <button onclick="handleLogout()" class="flex items-center text-sm font-semibold hover:text-white bg-slate-800 hover:bg-rose-600 px-4 py-2 rounded-lg transition">
                ${getIcon('LogOut', 16, 'mr-2')} Keluar
              </button>
            </div>
          </header>

          <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8 w-full">
            <nav class="w-full md:w-64 shrink-0 space-y-2">
              <button onclick="switchAdminTab('links')" id="tab-btn-links" class="w-full flex items-center px-4 py-3.5 rounded-xl font-bold transition bg-[#800020] text-white shadow-lg">
                ${getIcon('Layout', 20, 'mr-3')} Kelola Menu Web
              </button>
              <button onclick="switchAdminTab('settings')" id="tab-btn-settings" class="w-full flex items-center px-4 py-3.5 rounded-xl font-bold transition bg-white text-slate-600 border">
                ${getIcon('Settings', 20, 'mr-3')} Ganti Password
              </button>
            </nav>

            <main id="admin-main-content" class="flex-1 min-w-0">
               <!-- Tabel di-render di sini -->
            </main>
          </div>
          <div id="modal-container"></div>
        </div>
      `;
    }

    function switchAdminTab(tab) {
      activeAdminTab = tab;
      document.getElementById('tab-btn-links').className = `w-full flex items-center px-4 py-3.5 rounded-xl font-bold transition ${tab === 'links' ? 'bg-[#800020] text-white shadow-lg' : 'bg-white text-slate-600 border'}`;
      document.getElementById('tab-btn-settings').className = `w-full flex items-center px-4 py-3.5 rounded-xl font-bold transition ${tab === 'settings' ? 'bg-[#800020] text-white shadow-lg' : 'bg-white text-slate-600 border'}`;
      
      if (tab === 'links') renderAdminLinksView();
      else renderAdminSettingsView();
    }

    function renderAdminLinksView() {
      document.getElementById('admin-main-content').innerHTML = `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="p-6 border-b flex justify-between items-center bg-slate-50/50">
            <div><h2 class="text-xl font-extrabold text-slate-800">Daftar Tautan Web</h2></div>
            <button onclick="openLinkForm()" class="bg-slate-900 hover:bg-[#800020] text-white px-4 py-2 rounded-xl font-bold flex items-center transition">
              ${getIcon('Plus', 18, 'mr-2')} Tambah
            </button>
          </div>
          <div class="p-4 overflow-x-auto">
            <table class="w-full text-left border-collapse text-sm">
              <thead><tr><th class="p-3 border-b">Ikon</th><th class="p-3 border-b">Detail Menu</th><th class="p-3 border-b text-right">Aksi</th></tr></thead>
              <tbody id="admin-table-body"></tbody>
            </table>
          </div>
        </div>
      `;
      renderAdminLinks();
    }

    function renderAdminLinks() {
      const tbody = document.getElementById('admin-table-body');
      if (!tbody) return;

      if (appLinks.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-slate-400">Data kosong</td></tr>`;
        return;
      }

      tbody.innerHTML = appLinks.map(l => `
        <tr class="hover:bg-slate-50">
          <td class="p-3"><div class="${l.color} w-10 h-10 rounded-lg flex items-center justify-center text-white">${getIcon(l.iconName, 20)}</div></td>
          <td class="p-3">
            <p class="font-bold text-base text-slate-800">${l.title}</p>
            <p class="text-slate-500">${l.desc}</p>
            <p class="text-[#800020] text-xs font-mono">${l.url}</p>
          </td>
          <td class="p-3 text-right whitespace-nowrap">
            <button onclick="openLinkFormById('${l.id}')" class="text-blue-500 hover:bg-blue-100 bg-blue-50 p-2.5 rounded-lg mr-2 transition">${getIcon('Edit2', 16)}</button>
            <button onclick="requestDeleteLink('${l.id}')" class="text-red-500 hover:bg-red-100 bg-red-50 p-2.5 rounded-lg transition">${getIcon('Trash2', 16)}</button>
          </td>
        </tr>
      `).join('');
    }

    function renderAdminSettingsView() {
      document.getElementById('admin-main-content').innerHTML = `
        <div class="bg-white rounded-2xl shadow-sm border p-6 max-w-xl">
          <h2 class="text-xl font-extrabold text-slate-800 mb-6">Ubah Password Admin</h2>
          <form onsubmit="changePassword(event)" class="space-y-4">
            <div id="pass-msg" class="hidden p-3 rounded-lg text-sm font-bold"></div>
            <div><label class="block text-sm font-bold mb-1 text-slate-700">Username Admin</label><input disabled value="${currentUser.username}" class="w-full bg-slate-100 border rounded-lg px-4 py-2.5 text-slate-500 font-medium" /></div>
            <div><label class="block text-sm font-bold mb-1 text-slate-700">Password Saat Ini</label><input id="pass-old" type="password" required class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-[#800020] outline-none" /></div>
            <hr class="my-4"/>
            <div><label class="block text-sm font-bold mb-1 text-slate-700">Password Baru</label><input id="pass-new" type="password" required class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-[#800020] outline-none" /></div>
            <div><label class="block text-sm font-bold mb-1 text-slate-700">Konfirmasi Password Baru</label><input id="pass-confirm" type="password" required class="w-full border rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-[#800020] outline-none" /></div>
            <button id="btn-pass-submit" type="submit" class="w-full bg-[#800020] hover:bg-[#5c0017] text-white font-bold py-3 rounded-xl mt-4 shadow-lg transition">Update Password</button>
          </form>
        </div>
      `;
    }

    // --- MODAL: LOGIN ---
    function showLoginModal() {
      document.getElementById('modal-container').innerHTML = `
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
          <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
            <div class="bg-gradient-to-br from-[#800020] to-[#4a0011] p-8 text-center">
              ${getIcon('Shield', 56, 'text-rose-100 mx-auto mb-3')}
              <h3 class="text-2xl font-bold text-white">Otorisasi Admin</h3>
            </div>
            <form onsubmit="handleLogin(event)" class="p-8 space-y-4">
              <div id="login-error" class="hidden bg-red-50 text-red-700 p-3 rounded-xl text-sm flex items-center border border-red-100"></div>
              <div class="relative">
                ${getIcon('User', 18, 'absolute left-3.5 top-3.5 text-slate-400')}
                <input id="login-user" required type="text" placeholder="Username" class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-[#800020] outline-none" />
              </div>
              <div class="relative">
                ${getIcon('Key', 18, 'absolute left-3.5 top-3.5 text-slate-400')}
                <input id="login-pass" required type="password" placeholder="Password" class="w-full pl-11 pr-4 py-2.5 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-[#800020] outline-none" />
              </div>
              <div class="pt-2 flex gap-3">
                <button type="button" onclick="hideModal()" class="flex-1 py-2.5 rounded-xl text-slate-600 font-bold hover:bg-slate-100 transition">Batal</button>
                <button id="btn-login-submit" type="submit" class="flex-1 bg-[#800020] hover:bg-[#5c0017] text-white rounded-xl font-bold transition shadow-lg shadow-rose-900/20">Login</button>
              </div>
            </form>
          </div>
        </div>
      `;
    }

    // --- MODAL: LINK FORM ---
    function openLinkFormById(id) {
      const link = appLinks.find(l => l.id == id);
      openLinkForm(link);
    }

    function openLinkForm(linkObj = null) {
      currentLinkForm = linkObj || { id: null, title: '', url: '', desc: '', iconName: 'LinkIcon', color: 'bg-slate-800' };
      renderLinkFormModal();
    }

    function renderLinkFormModal() {
      document.getElementById('modal-container').innerHTML = `
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
          <div class="bg-white rounded-3xl shadow-xl w-full max-w-xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between bg-slate-50">
              <h3 class="text-xl font-bold flex items-center">${getIcon('Settings', 20, 'mr-2 text-[#800020]')} Form Tautan Web</h3>
              <button onclick="hideModal()" class="text-slate-400 hover:text-red-500 transition">${getIcon('X', 24)}</button>
            </div>
            <form onsubmit="saveLink(event)" class="p-6 overflow-y-auto space-y-4 custom-scroll">
              <div><label class="block font-bold mb-1 text-sm text-slate-700">Judul Tautan</label><input id="lf-title" required value="${currentLinkForm.title}" class="w-full border rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-[#800020] bg-slate-50"/></div>
              <div><label class="block font-bold mb-1 text-sm text-slate-700">URL Tujuan (https://...)</label><input id="lf-url" required value="${currentLinkForm.url}" class="w-full border rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-[#800020] bg-slate-50 font-mono text-sm"/></div>
              <div><label class="block font-bold mb-1 text-sm text-slate-700">Deskripsi Singkat</label><input id="lf-desc" required value="${currentLinkForm.desc}" class="w-full border rounded-xl px-4 py-2.5 outline-none focus:ring-2 focus:ring-[#800020] bg-slate-50"/></div>
              
              <div class="grid grid-cols-2 gap-4 pt-2">
                <div>
                  <label class="block font-bold mb-2 text-sm text-slate-700">Pilih Ikon</label>
                  <div class="grid grid-cols-4 gap-2">
                    ${Object.keys(SVG_PATHS).map(k => `
                      <button type="button" onclick="updateLinkForm('iconName', '${k}')" class="p-2.5 rounded-xl border flex justify-center transition-all ${currentLinkForm.iconName===k?'bg-rose-50 border-[#800020] text-[#800020] shadow-sm':'text-slate-500 hover:bg-slate-50'}">
                        ${getIcon(k, 20)}
                      </button>
                    `).join('')}
                  </div>
                </div>
                <div>
                  <label class="block font-bold mb-2 text-sm text-slate-700">Pilih Warna Dasar</label>
                  <div class="grid grid-cols-4 gap-2">
                    ${COLOR_OPTIONS.map(c => `
                      <button type="button" onclick="updateLinkForm('color', '${c}')" class="aspect-square rounded-xl ${c} flex items-center justify-center border-2 transition-all ${currentLinkForm.color===c?'border-slate-900 scale-110':'border-transparent hover:scale-105 hover:shadow-sm'}">
                        ${currentLinkForm.color===c ? getIcon('CheckCircle', 16, 'text-white') : ''}
                      </button>
                    `).join('')}
                  </div>
                </div>
              </div>
              <button id="lf-submit" type="submit" class="w-full mt-6 bg-[#800020] hover:bg-[#5c0017] text-white py-3.5 rounded-xl font-bold shadow-lg transition">Simpan Konfigurasi</button>
            </form>
          </div>
        </div>
      `;
    }

    function updateLinkForm(field, value) {
      currentLinkForm.title = document.getElementById('lf-title').value;
      currentLinkForm.url = document.getElementById('lf-url').value;
      currentLinkForm.desc = document.getElementById('lf-desc').value;
      currentLinkForm[field] = value;
      renderLinkFormModal();
    }

    // --- MODAL: ALERT & CONFIRM ---
    function hideModal() {
      document.getElementById('modal-container').innerHTML = '';
    }

    function customAlert(title, text) {
      document.getElementById('modal-container').innerHTML = `
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] animate-fade-in">
          <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl p-6">
            <h4 class="text-lg font-bold text-slate-800 flex items-center mb-2 text-[#800020]">${getIcon('AlertCircle', 20, 'mr-2')}${title}</h4>
            <p class="text-slate-600 text-sm leading-relaxed">${text}</p>
            <button onclick="hideModal()" class="mt-6 w-full bg-[#800020] hover:bg-[#5c0017] text-white font-bold py-2.5 rounded-xl transition">Mengerti</button>
          </div>
        </div>
      `;
    }

    function customConfirm(text, callback) {
      confirmCallback = callback;
      document.getElementById('modal-container').innerHTML = `
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[100] animate-fade-in">
          <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl p-6">
            <h4 class="text-lg font-bold text-slate-800 flex items-center mb-2 text-rose-700">${getIcon('AlertCircle', 20, 'mr-2')} Konfirmasi</h4>
            <p class="text-slate-600 text-sm leading-relaxed">${text}</p>
            <div class="mt-6 flex gap-3">
              <button onclick="hideModal()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl font-bold transition">Batal</button>
              <button onclick="executeConfirm()" class="flex-1 bg-[#800020] hover:bg-[#5c0017] text-white py-2.5 rounded-xl font-bold transition shadow-md">Ya, Lanjutkan</button>
            </div>
          </div>
        </div>
      `;
    }

    function executeConfirm() {
      if (confirmCallback) confirmCallback();
    }

    // --- LOGIC: ACTION HANDLERS ---
    async function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('login-user').value;
      const pass = document.getElementById('login-pass').value;
      const btn = document.getElementById('btn-login-submit');
      const errDiv = document.getElementById('login-error');
      
      btn.disabled = true; btn.innerText = 'Cek...';
      errDiv.classList.add('hidden');

      try {
        const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: 'login', username: user, password: pass }) });
        const data = await res.json();
        if (data.status === 'success' && data.user.role === 'admin') {
          currentUser = data.user;
          localStorage.setItem('smp_darul_madinah_admin', JSON.stringify(data.user));
          hideModal();
          renderBase(); 
        } else {
          errDiv.innerHTML = `${getIcon('AlertCircle', 16, 'mr-2 flex-shrink-0')} Kredensial salah atau bukan Admin.`;
          errDiv.classList.remove('hidden');
        }
      } catch (e) {
        errDiv.innerHTML = `${getIcon('AlertCircle', 16, 'mr-2 flex-shrink-0')} Gagal terhubung server. Cek link Web App GAS Anda.`;
        errDiv.classList.remove('hidden');
      }
      btn.disabled = false; btn.innerText = 'Login';
    }

    function handleLogout() {
      currentUser = null;
      localStorage.removeItem('smp_darul_madinah_admin');
      activeAdminTab = 'links';
      renderBase();
    }

    async function changePassword(e) {
      e.preventDefault();
      const oldP = document.getElementById('pass-old').value;
      const newP = document.getElementById('pass-new').value;
      const confP = document.getElementById('pass-confirm').value;
      const msg = document.getElementById('pass-msg');
      const btn = document.getElementById('btn-pass-submit');

      const showMsg = (text, type) => {
        msg.className = `p-3 rounded-lg text-sm font-bold border ${type === 'err' ? 'bg-red-50 text-red-700 border-red-100' : 'bg-emerald-50 text-emerald-700 border-emerald-100'}`;
        msg.innerHTML = `${getIcon(type === 'err' ? 'AlertCircle' : 'CheckCircle', 18, 'mr-2 inline-block -mt-1')} ${text}`;
        msg.classList.remove('hidden');
        setTimeout(() => msg.classList.add('hidden'), 4000);
      };

      if (newP !== confP) return showMsg('Konfirmasi tidak cocok!', 'err');
      if (newP.length < 5) return showMsg('Minimal 5 karakter!', 'err');

      btn.disabled = true; btn.innerText = 'Menyimpan...';

      try {
        const verify = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: 'login', username: currentUser.username, password: oldP }) }).then(r=>r.json());
        if (verify.status !== 'success') throw new Error('Password lama salah!');
        
        await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: 'saveUser', username: currentUser.username, password: newP, role: 'admin' }) });
        
        showMsg('Berhasil diubah!', 'success');
        document.getElementById('pass-old').value = ''; document.getElementById('pass-new').value = ''; document.getElementById('pass-confirm').value = '';
      } catch (error) {
        showMsg(error.message || 'Gagal menyimpan.', 'err');
      }
      btn.disabled = false; btn.innerText = 'Update Password';
    }

    async function saveLink(e) {
      e.preventDefault();
      currentLinkForm.title = document.getElementById('lf-title').value;
      currentLinkForm.url = document.getElementById('lf-url').value;
      currentLinkForm.desc = document.getElementById('lf-desc').value;
      
      const btn = document.getElementById('lf-submit');
      btn.disabled = true; btn.innerText = 'Menyimpan...';

      const isEdit = !!currentLinkForm.id;
      const payload = isEdit ? currentLinkForm : { ...currentLinkForm, id: Date.now().toString() };
      
      try {
        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'saveLink', link: payload }) });
        if (isEdit) {
          appLinks = appLinks.map(l => l.id == payload.id ? payload : l);
        } else {
          appLinks.push(payload);
        }
        hideModal();
        renderAdminLinks();
      } catch (e) {
        customAlert("Error", "Gagal menyimpan tautan.");
      }
      btn.disabled = false;
    }

    function requestDeleteLink(id) {
      customConfirm("Apakah Anda yakin ingin menghapus permanen tautan menu ini?", () => executeDeleteLink(id));
    }

    async function executeDeleteLink(id) {
      hideModal(); 
      try {
        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteLink', id }) });
        appLinks = appLinks.filter(l => l.id != id);
        renderAdminLinks();
      } catch (e) {
        customAlert("Error", "Gagal menghapus tautan dari server.");
      }
    }
  </script>
</body>
</html>
