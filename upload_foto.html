<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Dokumentasi G-Drive</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM versi UMD (Super Aman untuk GitHub Pages & Embed GSites) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone untuk membaca tag HTML di dalam JavaScript -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Library Ikon -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <!-- HAPUS atribut data-type="module" agar Babel bisa berjalan langsung -->
  <script type="text/babel">
    // 1. Ambil fungsi bawaan React dari global script (menggantikan fungsi 'import' yang bermasalah)
    const { useState, useEffect, useRef } = React;
    const { createRoot } = ReactDOM;

    // 2. Buat pembungkus Ikon Dinamis agar kamu tidak perlu mengubah satupun kode UI di menu
    const LucideIcon = ({ name, className, ...props }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current) {
          iconRef.current.innerHTML = '';
          const icon = lucide.createSvgElement({
            iconName: name,
            attrs: { class: className, ...props }
          });
          iconRef.current.appendChild(icon);
        }
      }, [name, className, props]);
      return <span ref={iconRef} className="inline-flex items-center justify-center" />;
    };

    // 3. Daftarkan persis semua ikon yang dipakai di file aslimu
    const FolderOpen = (props) => <LucideIcon name="folder-open" {...props} />;
    const UploadCloud = (props) => <LucideIcon name="upload-cloud" {...props} />;
    const Activity = (props) => <LucideIcon name="activity" {...props} />;
    const CheckCircle = (props) => <LucideIcon name="check-circle" {...props} />;
    const Clock = (props) => <LucideIcon name="clock" {...props} />;
    const FileText = (props) => <LucideIcon name="file-text" {...props} />;
    const ExternalLink = (props) => <LucideIcon name="external-link" {...props} />;
    const Trash2 = (props) => <LucideIcon name="trash-2" {...props} />;
    const HardDrive = (props) => <LucideIcon name="hard-drive" {...props} />;
    const Search = (props) => <LucideIcon name="search" {...props} />;
    const AlertCircle = (props) => <LucideIcon name="alert-circle" {...props} />;
    const Lock = (props) => <LucideIcon name="lock" {...props} />;
    const User = (props) => <LucideIcon name="user" {...props} />;
    const LogOut = (props) => <LucideIcon name="log-out" {...props} />;
    const Users = (props) => <LucideIcon name="users" {...props} />;
    const UserPlus = (props) => <LucideIcon name="user-plus" {...props} />;
    const Shield = (props) => <LucideIcon name="shield" {...props} />;
    const Eye = (props) => <LucideIcon name="eye" {...props} />;
    const EyeOff = (props) => <LucideIcon name="eye-off" {...props} />;
    const Edit2 = (props) => <LucideIcon name="edit-2" {...props} />;
    const Save = (props) => <LucideIcon name="save" {...props} />;
    const X = (props) => <LucideIcon name="x" {...props} />;

    // --- LOGIKA ASLI APLIKASIMU DIMULAI DARI SINI ---
        );
      }
      return (
        <div className="w-12 h-12 rounded bg-slate-50 flex items-center justify-center border border-slate-200 text-slate-400">
          <Icon name="file-text" className="w-6 h-6" />
        </div>
      );
    };

    // FUNGSI UTAMA APLIKASI
    function App() {
      // --- PENANGANAN SAFE STORAGE (Solusi khusus untuk Google Sites Iframe) ---
      const getSafeStorage = (key, defaultValue) => {
        try {
          const item = localStorage.getItem(key);
          return item ? JSON.parse(item) : defaultValue;
        } catch (e) {
          // Jika localStorage diblokir oleh iframe sandbox Google Sites
          console.warn("Akses localStorage diblokir. Menggunakan memori sementara.");
          return defaultValue;
        }
      };

      const setSafeStorage = (key, value) => {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
          // Gagal menyimpan ke localStorage, abaikan saja (state React tetap berjalan di memori)
        }
      };

      // --- STATE UTAMA ---
      const [user, setUser] = useState(() => getSafeStorage('smp_darul_madinah_user', null));
      const [view, setView] = useState('login'); // login, user_dashboard, admin_dashboard
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      
      // State simulasi database (Untuk demo visual tanpa backend aktif langsung)
      const [files, setFiles] = useState([
        { id: '1', name: 'Rencana_Pembelajaran_IPA_7.pdf', newName: 'K_IPA_Rencana_Pembelajaran_IPA_7.pdf', size: 1245000, date: '2026-06-20', url: '#', downloadUrl: '#' },
        { id: '2', name: 'Foto_Kegiatan_Idul_Adha.jpg', newName: 'D_FOTO_Foto_Kegiatan_Idul_Adha.jpg', size: 3450000, date: '2026-06-18', url: '#', downloadUrl: '#' }
      ]);
      const [activityLogs, setActivityLogs] = useState([
        { id: '1', user: 'Admin', action: 'Mengunduh file K_IPA_Rencana_Pembelajaran_IPA_7.pdf', time: '2026-06-21 09:15' },
        { id: '2', user: 'Guru IPA', action: 'Mengunggah file Foto_Kegiatan_Idul_Adha.jpg', time: '2026-06-18 14:20' }
      ]);

      // State Upload File
      const [selectedFile, setSelectedFile] = useState(null);
      const [category, setCategory] = useState('K_IPA');
      const [customTitle, setCustomTitle] = useState('');
      const [isUploading, setIsUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);
      const [uploadStatus, setUploadStatus] = useState('');

      // Integrasi Sinkronisasi Session Login
      useEffect(() => {
        if (user) {
          setSafeStorage('smp_darul_madinah_user', user);
          setView(user.role === 'admin' ? 'admin_dashboard' : 'user_dashboard');
        } else {
          try { localStorage.removeItem('smp_darul_madinah_user'); } catch(e){}
          setView('login');
        }
      }, [user]);

      // --- FUNGSI LOGIN ---
      const handleLogin = (e) => {
        e.preventDefault();
        setLoginError('');

        // Contoh Kredensial Statis (Bisa diganti atau diintegrasikan dengan Google Sheets API)
        if (username === 'admin' && password === 'admin123') {
          setUser({ username: 'Admin Sekolah', role: 'admin' });
        } else if (username === 'guru' && password === 'guru123') {
          setUser({ username: 'Guru Mata Pelajaran', role: 'guru' });
        } else {
          setLoginError('Username atau Password salah!');
        }
      };

      const handleLogout = () => {
        setUser(null);
      };

      // --- FUNGSI UPLOAD ---
      const handleFileChange = (e) => {
        if (e.target.files.length > 0) {
          setSelectedFile(e.target.files[0]);
        }
      };

      const handleUpload = (e) => {
        e.preventDefault();
        if (!selectedFile) return;

        setIsUploading(true);
        setUploadStatus('Mengonversi file...');
        
        // Simulasi proses upload bertahap
        let progress = 10;
        const interval = setInterval(() => {
          progress += 15;
          if (progress >= 100) {
            clearInterval(interval);
            
            // Format nama baru sesuai aturan kegiatan
            const ext = selectedFile.name.split('.').pop();
            const safeTitle = customTitle.replace(/[^a-zA-Z0-9]/g, '_');
            const generatedName = `${category}_${safeTitle || 'File'}.${ext}`;

            const newFileEntry = {
              id: Date.now().toString(),
              name: selectedFile.name,
              newName: generatedName,
              size: selectedFile.size,
              date: new Date().toISOString().split('T')[0],
              url: '#',
              downloadUrl: '#'
            };

            setFiles(prev => [newFileEntry, ...prev]);
            setActivityLogs(prev => [
              {
                id: Date.now().toString(),
                user: user.username,
                action: `Mengunggah file ${generatedName}`,
                time: new Date().toLocaleString('id-ID', { hour12: false }).replace(/\//g, '-')
              },
              ...prev
            ]);

            setIsUploading(false);
            setUploadProgress(0);
            setSelectedFile(null);
            setCustomTitle('');
            setUploadStatus('Berhasil diunggah!');
            setTimeout(() => setUploadStatus(''), 3000);
          } else {
            setUploadProgress(progress);
            setUploadStatus(`Mengunggah ke Google Drive... ${progress}%`);
          }
        }, 300);
      };

      // --- RENDER HALAMAN LOGIN ---
      if (view === 'login') {
        return (
          <div className="min-h-screen flex items-center justify-center px-4 py-12">
            <div className="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
              <div className="text-center">
                <div className="mx-auto h-16 w-16 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 mb-4">
                  <Icon name="hard-drive" className="w-10 h-10" />
                </div>
                <h2 className="text-3xl font-extrabold text-slate-900">SMP Darul Madinah</h2>
                <p className="mt-2 text-sm text-slate-500">Sistem Pengarsipan & Dokumentasi Digital</p>
              </div>

              <form className="mt-8 space-y-6" onSubmit={handleLogin}>
                {loginError && (
                  <div className="bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-lg flex items-center gap-2">
                    <Icon name="alert-circle" className="w-5 h-5 flex-shrink-0" />
                    <span>{loginError}</span>
                  </div>
                )}

                <div className="rounded-md space-y-4">
                  <div>
                    <label className="text-xs font-semibold text-slate-600 uppercase tracking-wider block mb-1">Username</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <Icon name="user" className="w-5 h-5" />
                      </div>
                      <input
                        type="text"
                        required
                        className="appearance-none rounded-lg relative block w-full pl-10 pr-3 py-2.5 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        placeholder="Masukkan username Anda"
                        value={username}
                        onChange={(e) => setUsername(e.target.value)}
                      />
                    </div>
                  </div>

                  <div>
                    <label className="text-xs font-semibold text-slate-600 uppercase tracking-wider block mb-1">Password</label>
                    <div className="relative">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <Icon name="lock" className="w-5 h-5" />
                      </div>
                      <input
                        type="password"
                        required
                        className="appearance-none rounded-lg relative block w-full pl-10 pr-3 py-2.5 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                        placeholder="••••••••"
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                      />
                    </div>
                  </div>
                </div>

                <div>
                  <button
                    type="submit"
                    className="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors shadow-md hover:shadow-lg"
                  >
                    Masuk ke Sistem
                  </button>
                </div>
                <div className="text-center text-xs text-slate-400">
                  <p>Akses Terbatas untuk Staf & Guru SMP Darul Madinah</p>
                </div>
              </form>
            </div>
          </div>
        );
      }

      // --- RENDER DASHBOARD (USER DAN ADMIN) ---
      const isAdmin = user && user.role === 'admin';

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          {/* Header */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16 items-center">
                <div className="flex items-center gap-3">
                  <div className="h-10 w-10 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                    <Icon name="hard-drive" className="w-6 h-6" />
                  </div>
                  <div>
                    <h1 className="text-lg font-bold text-slate-900 leading-tight">Arsip Darul Madinah</h1>
                    <p className="text-xs text-slate-500">{isAdmin ? 'Panel Kontrol Admin' : 'Panel Kontribusi Guru'}</p>
                  </div>
                </div>
                
                <div className="flex items-center gap-4">
                  <div className="hidden sm:flex flex-col items-end text-right">
                    <span className="text-sm font-semibold text-slate-800">{user.username}</span>
                    <span className="text-xs text-slate-400 uppercase tracking-wider">{user.role}</span>
                  </div>
                  <button
                    onClick={handleLogout}
                    className="flex items-center gap-1.5 px-3 py-1.5 border border-slate-200 text-sm font-medium rounded-lg text-slate-600 hover:bg-red-50 hover:text-red-600 hover:border-red-100 transition-all"
                  >
                    <Icon name="log-out" className="w-4 h-4" />
                    <span className="hidden sm:inline">Keluar</span>
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            {/* SISI KIRI: Formulir Upload (Tersedia untuk Admin & Guru) */}
            <div className="lg:col-span-1 space-y-6">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex items-center gap-2 pb-4 mb-4 border-b border-slate-100">
                  <Icon name="upload-cloud" className="text-blue-500 w-5 h-5" />
                  <h2 className="text-md font-bold text-slate-800">Unggah Dokumentasi Baru</h2>
                </div>

                <form onSubmit={handleUpload} className="space-y-4">
                  <div>
                    <label className="block text-xs font-semibold text-slate-600 uppercase mb-1">Kategori Arsip</label>
                    <select
                      className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      value={category}
                      onChange={(e) => setCategory(e.target.value)}
                    >
                      <option value="K_IPA">Kegiatan - IPA</option>
                      <option value="K_IPS">Kegiatan - IPS</option>
                      <option value="D_FOTO">Dokumentasi - Foto</option>
                      <option value="D_LAP">Dokumentasi - Laporan</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-slate-600 uppercase mb-1">Nama / Deskripsi Kegiatan</label>
                    <input
                      type="text"
                      required
                      placeholder="Contoh: Rapat Wali Murid"
                      className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      value={customTitle}
                      onChange={(e) => setCustomTitle(e.target.value)}
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-semibold text-slate-600 uppercase mb-1">Pilih File</label>
                    <div className="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-lg hover:bg-slate-50 transition cursor-pointer relative">
                      <input
                        type="file"
                        required
                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                        onChange={handleFileChange}
                      />
                      <div className="space-y-1 text-center">
                        <Icon name="folder-open" className="mx-auto h-12 w-12 text-slate-400" />
                        <div className="flex text-sm text-slate-600">
                          <span className="relative rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                            {selectedFile ? selectedFile.name : 'Pilih file dari komputer'}
                          </span>
                        </div>
                        <p className="text-xs text-slate-400">
                          {selectedFile ? formatBytes(selectedFile.size) : 'Semua format diperbolehkan hingga 20MB'}
                        </p>
                      </div>
                    </div>
                  </div>

                  {isUploading && (
                    <div className="space-y-1">
                      <div className="flex justify-between text-xs font-medium text-slate-600">
                        <span>{uploadStatus}</span>
                        <span>{uploadProgress}%</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-2">
                        <div className="bg-blue-600 h-2 rounded-full transition-all duration-300" style={{ width: `${uploadProgress}%` }}></div>
                      </div>
                    </div>
                  )}

                  {uploadStatus && !isUploading && (
                    <div className="bg-emerald-50 text-emerald-700 text-sm p-3 rounded-lg flex items-center gap-2 border border-emerald-100">
                      <Icon name="check-circle" className="w-5 h-5" />
                      <span>{uploadStatus}</span>
                    </div>
                  )}

                  <button
                    type="submit"
                    disabled={isUploading}
                    className="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-semibold text-sm rounded-lg transition shadow-sm flex items-center justify-center gap-2"
                  >
                    <Icon name="upload-cloud" className="w-4 h-4" />
                    Mulai Unggah
                  </button>
                </form>
              </div>
            </div>

            {/* SISI KANAN: Berkas Terunggah (Lebar 2 Kolom) */}
            <div className="lg:col-span-2 space-y-6">
              {/* Daftar Berkas */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between pb-4 mb-4 border-b border-slate-100 gap-4">
                  <div className="flex items-center gap-2">
                    <Icon name="folder-open" className="text-yellow-500 w-5 h-5" />
                    <h2 className="text-md font-bold text-slate-800">Galeri Berkas Terarsip</h2>
                  </div>
                  <span className="bg-blue-50 text-blue-700 text-xs px-2.5 py-1 rounded-full font-semibold">
                    {files.length} Berkas Tersimpan
                  </span>
                </div>

                {files.length === 0 ? (
                  <div className="text-center py-12 text-slate-400 space-y-2">
                    <Icon name="folder-open" className="w-12 h-12 mx-auto text-slate-300" />
                    <p className="text-sm">Belum ada berkas yang diunggah.</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {files.map(file => (
                      <div key={file.id} className="flex items-center gap-4 p-3 hover:bg-slate-50 rounded-xl border border-slate-150 transition group">
                        <FilePreview file={file} />
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-semibold text-slate-800 truncate" title={file.newName}>
                            {file.newName}
                          </p>
                          <div className="flex gap-4 text-xs text-slate-400 mt-0.5">
                            <span>{formatBytes(file.size)}</span>
                            <span>•</span>
                            <span>{file.date}</span>
                          </div>
                        </div>
                        <div className="flex gap-2">
                          <a
                            href={file.url}
                            className="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition"
                            title="Buka File"
                          >
                            <Icon name="external-link" className="w-4 h-4" />
                          </a>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Log Aktivitas Terbaru (Hanya untuk Admin) */}
              {isAdmin && (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <div className="flex items-center gap-2 pb-4 mb-4 border-b border-slate-100">
                    <Icon name="activity" className="text-rose-500 w-5 h-5" />
                    <h2 className="text-md font-bold text-slate-800">Catatan Aktivitas Admin</h2>
                  </div>
                  <div className="space-y-3 max-h-48 overflow-y-auto">
                    {activityLogs.map(log => (
                      <div key={log.id} className="flex items-start gap-3 text-xs border-l-2 border-slate-200 pl-3 py-0.5">
                        <div className="flex-1">
                          <span className="font-semibold text-slate-700">{log.user}</span>{' '}
                          <span className="text-slate-500">{log.action}</span>
                        </div>
                        <span className="text-slate-400 whitespace-nowrap">{log.time}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    // Merender React App ke Root
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
